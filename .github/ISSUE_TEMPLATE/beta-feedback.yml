name: Beta feedback
description: Report a problem or share feedback from using Fjällkompis on (or off) the trail.
title: '[Feedback] '
labels: ['beta-feedback']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Fjällkompis! A few details below make feedback much
        more useful. Skip anything you don't know — a short report is better
        than no report. **Please never paste exact GPS coordinates or exported
        location files into a public issue.**
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Settings → App version (e.g. 0.7.0)
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device & browser
      placeholder: e.g. Pixel 7, Chrome 126, installed as app
    validations:
      required: true
  - type: dropdown
    id: screen
    attributes:
      label: Where in the app?
      options:
        - Map (viewing / offline map)
        - Map (GPS / live tracking)
        - Today
        - Stages
        - Stops
        - Lists
        - Settings / backup
        - Installing / updating the app
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you see, what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context (optional)
      description: >
        Anything relevant — online or offline, roughly where you were (e.g.
        "on stage 3, mid-valley" — no exact coordinates), weather/sky view if
        it was GPS-related, battery observations, screenshots (crop out
        anything private).
  - type: checkboxes
    id: confirm
    attributes:
      label: Privacy check
      options:
        - label: I have not included exact GPS coordinates or location exports.
          required: true
