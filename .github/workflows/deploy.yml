name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

      # ---- Terrain relief archives: canonical GitHub Release assets ---------
      # Hillshade terrain-RGB + contour vectors (built by
      # scripts/build-terrain-map.sh from the Copernicus GLO-30 DEM). Same
      # model as the satellite archive: never committed, downloaded from the
      # pinned terrain-data release into the Pages build and served
      # same-origin. New data ⇒ new release tag ⇒ update TAG/SHA-256 pins.
      - name: Fetch terrain relief archives from the pinned data release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p public/maps
          gh release download terrain-data-v2 \
            --repo Algolon/Fjallkompis \
            --pattern 'kungsleden-terrain.pmtiles' \
            --pattern 'kungsleden-contours.pmtiles' \
            --dir public/maps
      - name: Verify terrain relief archive integrity
        run: |
          set -euo pipefail
          verify() {
            local f="$1" expected_sha="$2"
            local actual_sha
            actual_sha="$(sha256sum "$f" | awk '{print $1}')"
            echo "$f sha256: $actual_sha (expected $expected_sha)"
            [ "$actual_sha" = "$expected_sha" ] || { echo "FATAL: $f SHA-256 mismatch"; exit 1; }
          }
          verify public/maps/kungsleden-terrain.pmtiles "89eef71787ceb1f4b827b9eee1906fd799d89c4d4d587be31a4d944efb399aa5"
          verify public/maps/kungsleden-contours.pmtiles "3e794bffcd0306cd48f24bb8d04bde61cf2445d7b87b58d0dbac3b1fb0471ec5"

      # ---- Satellite archive: canonical GitHub Release asset ----------------
      # The ~42 MB PMTiles binary is NOT committed. The canonical copy lives on
      # the satellite-data-v2 Release; deployment downloads it into the Pages
      # build so browsers fetch it SAME-ORIGIN (GitHub Release assets send no
      # CORS headers, so the app cannot fetch them cross-origin directly).
      # New imagery ⇒ new release tag ⇒ update TAG/SHA-256/size pins here.
      - name: Fetch satellite archive from the pinned data release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p public/maps
          gh release download satellite-data-v2 \
            --repo Algolon/Fjallkompis \
            --pattern kungsleden-satellite.pmtiles \
            --dir public/maps
      - name: Verify satellite archive integrity
        run: |
          set -euo pipefail
          f=public/maps/kungsleden-satellite.pmtiles
          expected_sha="aed1d49072b21c1ada190c3dac19e9cafcd953718c496875192cb1c5078953eb"
          expected_size=11294208
          actual_sha="$(sha256sum "$f" | awk '{print $1}')"
          actual_size="$(stat -c '%s' "$f")"
          echo "sha256: $actual_sha (expected $expected_sha)"
          echo "size  : $actual_size (expected $expected_size)"
          [ "$actual_sha" = "$expected_sha" ] || { echo "FATAL: satellite archive SHA-256 mismatch"; exit 1; }
          [ "$actual_size" = "$expected_size" ] || { echo "FATAL: satellite archive size mismatch"; exit 1; }

      # Temporary map-comparison benchmark (docs/maps/thunderforest-outdoors-
      # benchmark.md). Both inputs are optional and the build never fails
      # over them:
      #  - VITE_ENABLE_MAP_BENCHMARK (repository VARIABLE, not sensitive):
      #    production shows the comparison selector only when it is "true";
      #  - VITE_THUNDERFOREST_API_KEY (repository SECRET): enables the
      #    ONLINE-ONLY Thunderforest option inside the benchmark selector.
      # NOTE: Vite inlines the key into the built JS, so the deployed app
      # exposes it in tile-request URLs (and Referer information may be
      # visible to Thunderforest); the secret only keeps it out of the
      # repository. Controls: quota monitoring, temporary deployment, key
      # rotation/removal — an origin allowlist only if the Thunderforest
      # dashboard actually supports one.
      - run: npm run build
        env:
          VITE_ENABLE_MAP_BENCHMARK: ${{ vars.VITE_ENABLE_MAP_BENCHMARK }}
          VITE_THUNDERFOREST_API_KEY: ${{ secrets.VITE_THUNDERFOREST_API_KEY }}

      - name: Verify terrain relief archives made it into the build
        run: |
          set -euo pipefail
          for f in dist/maps/kungsleden-terrain.pmtiles dist/maps/kungsleden-contours.pmtiles; do
            test -f "$f" || { echo "FATAL: $f missing from build output"; exit 1; }
          done
          echo "✓ terrain relief archives present in dist/maps"
      - name: Verify satellite archive made it into the build
        run: |
          set -euo pipefail
          f=dist/maps/kungsleden-satellite.pmtiles
          test -f "$f" || { echo "FATAL: $f missing from build output"; exit 1; }
          expected_sha="aed1d49072b21c1ada190c3dac19e9cafcd953718c496875192cb1c5078953eb"
          actual_sha="$(sha256sum "$f" | awk '{print $1}')"
          [ "$actual_sha" = "$expected_sha" ] || { echo "FATAL: built archive SHA-256 mismatch"; exit 1; }
          echo "✓ dist/maps/kungsleden-satellite.pmtiles present, sha256 verified"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Pages deployments can sit in GitHub's queue longer than the
          # default 10 minutes during backend slowdowns; wait up to 30.
          timeout: 1800000
