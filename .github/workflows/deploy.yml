name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          # Satellite archive URL (off-repo). The browser fetches this
          # cross-origin, so the HOST MUST SEND CORS HEADERS (Access-Control-
          # Allow-Origin) AND support Range requests.
          #
          # NOTE: a GitHub Release asset does NOT work — the current
          # release-assets.githubusercontent.com host returns Range/206 but NO
          # CORS header (verified on a runner), so a cross-origin fetch is
          # blocked and the app gracefully disables Satellite. Point this at a
          # CORS-enabled host instead (Cloudflare R2 / S3 bucket with a CORS
          # rule allowing GET+Range from https://algolon.github.io). See
          # README → Satellite imagery layer. Bump when you publish new imagery.
          VITE_SATELLITE_URL: https://REPLACE-WITH-CORS-ENABLED-HOST/kungsleden-satellite.pmtiles
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Pages deployments can sit in GitHub's queue longer than the
          # default 10 minutes during backend slowdowns; wait up to 30.
          timeout: 1800000
