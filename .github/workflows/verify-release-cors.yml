# TEMPORARY, throwaway. Checks — from a runner's open internet (no egress
# proxy) — whether the published satellite Release asset returns the CORS +
# range headers a browser needs. Delete after reading the result.
name: Verify release CORS (temporary)

on:
  push:
    branches: [claude/satellite-imagery-layer-66s55x]
    paths: ['.github/workflows/verify-release-cors.yml']

jobs:
  cors:
    runs-on: ubuntu-latest
    steps:
      - name: Probe release asset CORS + range
        run: |
          set -uo pipefail
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/satellite-data-v1/kungsleden-satellite.pmtiles"
          ORIGIN="https://algolon.github.io"
          echo "URL: $URL"
          echo

          echo "== HOP 1 (github.com 302) headers =="
          curl -sS -H "Origin: $ORIGIN" -H 'Range: bytes=0-0' -D hop1.txt -o /dev/null "$URL"
          grep -iE 'HTTP/|^location:|access-control' hop1.txt | sed -E 's/(sig=|jwt=)[^&]*/\1REDACTED/g'
          echo

          echo "== FINAL response (followed) headers =="
          curl -sSL -H "Origin: $ORIGIN" -H 'Range: bytes=0-16383' -D final.txt -o range.bin "$URL"
          grep -iE 'HTTP/[0-9]|access-control|^accept-ranges:|^content-range:|^content-type:|^content-length:' final.txt
          echo

          code="$(curl -sSL -o /dev/null -w '%{http_code}' -H 'Range: bytes=0-16383' "$URL")"
          magic="$(head -c 7 range.bin)"
          acao="$(grep -i 'access-control-allow-origin' final.txt || true)"

          echo "== VERDICT =="
          echo "range_status=$code (expect 206)"
          echo "magic='$magic' (expect PMTiles)"
          if [ -n "$acao" ]; then
            echo "CORS: PRESENT -> $acao"
            echo "RESULT: GitHub Release assets DO support browser CORS. Approach is viable."
          else
            echo "CORS: ABSENT (no access-control-allow-origin on the asset response)"
            echo "RESULT: GitHub Release assets do NOT support browser CORS -> a cross-origin"
            echo "        fetch()/download from the app origin will be blocked. Needs a"
            echo "        CORS-configured host (Cloudflare R2 / S3) instead."
          fi
